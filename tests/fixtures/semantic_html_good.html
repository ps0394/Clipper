<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Semantic HTML Good Example</title>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/about">About</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <article>
            <header>
                <h1>Well-Structured Article</h1>
                <p><time datetime="2026-01-15">January 15, 2026</time></p>
            </header>
            <section>
                <h2>Introduction</h2>
                <p>This page demonstrates proper HTML5 semantic markup.</p>
                <h3>Subtopic</h3>
                <p>Subheadings follow a clean hierarchy.</p>
            </section>
            <section>
                <h2>Details</h2>
                <figure>
                    <img src="diagram.png" alt="A diagram explaining the concept">
                    <figcaption>Figure 1: Illustration</figcaption>
                </figure>
            </section>
            <aside role="complementary">
                <p>Related material lives here.</p>
            </aside>
        </article>
    </main>
    <footer>
        <p>&copy; 2026 Example</p>
    </footer>
</body>
</html>
