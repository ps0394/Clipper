<!DOCTYPE html>
<html>
<head>
    <title>Semantic HTML Bad Example</title>
</head>
<body>
    <div class="header">
        <div class="nav">
            <div><a href="/">Home</a></div>
            <div><a href="/about">About</a></div>
        </div>
    </div>
    <div class="content">
        <div class="title">Div Soup Article</div>
        <div>This page uses no semantic HTML5 elements.</div>
        <div>Everything is a div.</div>
        <div>There are no headings at all.</div>
        <div>Agents cannot tell what this content is about from markup alone.</div>
        <div class="image"><img src="x.png"></div>
    </div>
    <div class="footer">Copyright notice here</div>
</body>
</html>
