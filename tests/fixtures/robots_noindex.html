<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Robots Noindex</title>
    <meta name="description" content="A page blocked from indexing.">
    <meta name="robots" content="noindex, nofollow">
</head>
<body>
    <main>
        <article>
            <h1>Noindex Example</h1>
            <p>Agents following robots directives should skip this page.</p>
        </article>
    </main>
</body>
</html>
