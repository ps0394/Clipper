<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>AKS FAQ - Complete</title>
    <meta name="description" content="Frequently asked questions about Azure Kubernetes Service.">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
            {
                "@type": "Question",
                "name": "What is AKS?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Azure Kubernetes Service is a managed Kubernetes offering on Azure."
                }
            },
            {
                "@type": "Question",
                "name": "How do I scale an AKS cluster?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Use the az aks scale command or enable the cluster autoscaler."
                }
            },
            {
                "@type": "Question",
                "name": "Does AKS support Windows nodes?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Yes, AKS supports Windows Server node pools alongside Linux nodes."
                }
            }
        ]
    }
    </script>
</head>
<body>
    <main>
        <h1>AKS FAQ</h1>
        <section>
            <h2>What is AKS?</h2>
            <p>Azure Kubernetes Service is a managed Kubernetes offering on Azure.</p>
        </section>
        <section>
            <h2>How do I scale an AKS cluster?</h2>
            <p>Use the az aks scale command or enable the cluster autoscaler.</p>
        </section>
        <section>
            <h2>Does AKS support Windows nodes?</h2>
            <p>Yes, AKS supports Windows Server node pools alongside Linux nodes.</p>
        </section>
    </main>
</body>
</html>
