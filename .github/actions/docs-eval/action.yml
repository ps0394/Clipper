name: 'YARA Documentation Evaluation'
description: 'Evaluate documentation pages for AI agent readiness using deterministic signals'
author: 'Retrievability Eval'

branding:
  icon: 'file-text'
  color: 'blue'

inputs:
  urls-file:
    description: 'Path to file containing URLs to evaluate (one per line)'
    required: true
  output-dir:
    description: 'Directory to save evaluation results'
    required: false
    default: 'eval-results'
  min-score:
    description: 'Minimum acceptable average parseability score (0-100)'
    required: false
    default: '70'
  min-clean-percentage:
    description: 'Minimum acceptable percentage of clean pages'
    required: false
    default: '60'
  fail-on-quality-gate:
    description: 'Whether to fail the action if quality gates are not met'
    required: false
    default: 'true'
  api-key:
    description: 'PageSpeed Insights API key for Lighthouse analysis (enables hybrid mode)'
    required: false
  
outputs:
  average-score:
    description: 'Average parseability score across all evaluated pages'
    value: ${{ steps.evaluate.outputs.avg_score }}
  clean-count:
    description: 'Number of pages classified as clean'
    value: ${{ steps.evaluate.outputs.clean_count }}
  clean-percentage:
    description: 'Percentage of pages classified as clean'
    value: ${{ steps.evaluate.outputs.clean_percentage }}
  total-pages:
    description: 'Total number of pages evaluated'
    value: ${{ steps.evaluate.outputs.total_pages }}
  structure-missing:
    description: 'Number of pages with structure-missing failure mode'
    value: ${{ steps.evaluate.outputs.structure_missing }}
  extraction-noisy:
    description: 'Number of pages with extraction-noisy failure mode'
    value: ${{ steps.evaluate.outputs.extraction_noisy }}
  report-path:
    description: 'Path to the generated markdown report'
    value: '${{ inputs.output-dir }}/report.md'
  scores-path:
    description: 'Path to the JSON scores file'
    value: '${{ inputs.output-dir }}/scores.json'
  quality-passed:
    description: 'Whether all quality gates passed'
    value: ${{ steps.evaluate.outputs.quality_passed }}

runs:
  using: 'composite'
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        if [ ! -f "${{ inputs.urls-file }}" ]; then
          echo "❌ Error: URLs file '${{ inputs.urls-file }}' not found"
          exit 1
        fi
        
        # Count URLs
        url_count=$(grep -v '^#' "${{ inputs.urls-file }}" | grep -v '^$' | wc -l)
        if [ "$url_count" -eq 0 ]; then
          echo "❌ Error: No valid URLs found in '${{ inputs.urls-file }}'"
          exit 1
        fi
        
        echo "📋 Found $url_count URLs to evaluate"
        
    - name: Setup evaluation environment
      shell: bash
      run: |
        # Create output directory
        mkdir -p "${{ inputs.output-dir }}"
        
        # Ensure Python dependencies are available
        python -c "import requests, bs4" 2>/dev/null || {
          echo "📦 Installing required Python packages..."
          pip install beautifulsoup4 requests
        }
        
    - name: Run evaluation pipeline
      id: evaluate
      shell: bash
      env:
        PAGESPEED_API_KEY: ${{ inputs.api-key }}
      run: |
        echo "🚀 Starting YARA evaluation pipeline..."
        
        # Run YARA 2.0 hybrid evaluation
        echo "🚀 Running YARA 2.0 Hybrid evaluation..."
        python -m retrievability.cli express "${{ inputs.urls-file }}" --out "${{ inputs.output-dir }}" --name evaluation
        
        echo "✅ Pipeline completed successfully"
        
        # Calculate metrics and set outputs
        python -c "
        import json
        import os
        
        with open('${{ inputs.output-dir }}/evaluation_scores.json') as f:
            scores = json.load(f)
        
        # Calculate metrics
        total_pages = len(scores)
        avg_score = sum(s['parseability_score'] for s in scores) / total_pages
        clean_count = sum(1 for s in scores if s['failure_mode'] == 'clean')
        structure_missing = sum(1 for s in scores if s['failure_mode'] == 'structure-missing')
        extraction_noisy = sum(1 for s in scores if s['failure_mode'] == 'extraction-noisy')
        clean_percentage = (clean_count / total_pages) * 100
        
        # Check quality gates
        min_score = float('${{ inputs.min-score }}')
        min_clean_pct = float('${{ inputs.min-clean-percentage }}')
        quality_passed = avg_score >= min_score and clean_percentage >= min_clean_pct
        
        # Set GitHub Actions outputs
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f'avg_score={avg_score:.1f}\\n')
            f.write(f'clean_count={clean_count}\\n')
            f.write(f'clean_percentage={clean_percentage:.1f}\\n')
            f.write(f'total_pages={total_pages}\\n')
            f.write(f'structure_missing={structure_missing}\\n')
            f.write(f'extraction_noisy={extraction_noisy}\\n')
            f.write(f'quality_passed={str(quality_passed).lower()}\\n')
        
        print(f'📊 Results: {avg_score:.1f}/100 avg, {clean_count}/{total_pages} clean ({clean_percentage:.1f}%)')
        
        if not quality_passed:
            print(f'⚠️ Quality gates not met (min score: {min_score}, min clean: {min_clean_pct}%)')
        else:
            print('✅ All quality gates passed')
        "
        
    - name: Check quality gates
      shell: bash
      run: |
        quality_passed="${{ steps.evaluate.outputs.quality_passed }}"
        fail_on_quality_gate="${{ inputs.fail-on-quality-gate }}"
        
        if [ "$quality_passed" = "false" ] && [ "$fail_on_quality_gate" = "true" ]; then
          echo "❌ Quality gates failed:"
          
          avg_score="${{ steps.evaluate.outputs.avg_score }}"
          clean_percentage="${{ steps.evaluate.outputs.clean_percentage }}"
          
          if (( $(echo "$avg_score < ${{ inputs.min-score }}" | bc -l) )); then
            echo "   • Average score $avg_score is below minimum ${{ inputs.min-score }}"
          fi
          
          if (( $(echo "$clean_percentage < ${{ inputs.min-clean-percentage }}" | bc -l) )); then
            echo "   • Clean pages $clean_percentage% is below minimum ${{ inputs.min-clean-percentage }}%"
          fi
          
          echo ""
          echo "💡 Recommendations:"
          echo "   • Review the generated report at ${{ inputs.output-dir }}/report.md"
          echo "   • Focus on pages with 'structure-missing' failure modes first"
          echo "   • Add semantic HTML elements (<main>, <article>) to improve scores"
          
          exit 1
        else
          echo "✅ Quality evaluation completed"
          if [ "$quality_passed" = "true" ]; then
            echo "   All quality gates passed"
          else
            echo "   Quality gates failed but action configured to continue"
          fi
        fi