name: Clipper Interactive Demo

on:
  workflow_dispatch:
    inputs:
      demo_mode:
        description: 'Interactive demo experience'
        type: choice
        options:
        - 'guided-walkthrough'
        - 'step-by-step-tutorial'
        - 'comparison-showcase'
        - 'live-evaluation-demo'
        default: 'guided-walkthrough'
      demo_url:
        description: 'URL for live interactive demo (optional)'
        required: false
        default: 'https://learn.microsoft.com/en-us/azure/azure-functions/functions-overview'
      include_explanations:
        description: 'Include detailed explanations and educational content'
        type: boolean
        default: true
  schedule:
    # Weekly interactive demo on Wednesdays at 3pm UTC for visibility
    - cron: '0 15 * * 3'

jobs:
  interactive-demo:
    runs-on: ubuntu-latest
    name: "🎮 Interactive Clipper Experience" 
    
    outputs:
      demo_completed: ${{ steps.demo-execution.outputs.demo_completed }}
      evaluation_score: ${{ steps.demo-execution.outputs.evaluation_score }}
      demo_insights: ${{ steps.demo-execution.outputs.demo_insights }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Chrome for live demonstration
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable

    - name: Install ChromeDriver
      run: |
        pip install webdriver-manager
      
    - name: Install dependencies
      run: |
        pip install -e .
        
    - name: Initialize Interactive Demo Environment
      run: |
        MODE="${{ github.event.inputs.demo_mode || 'guided-walkthrough' }}"
        URL="${{ github.event.inputs.demo_url || 'https://learn.microsoft.com/en-us/azure/azure-functions/functions-overview' }}"
        EXPLANATIONS="${{ github.event.inputs.include_explanations || 'true' }}"
        
        echo "🎮 Initializing Interactive Clipper Demo"
        echo "============================================"
        echo "Mode: $MODE"  
        echo "Target URL: $URL"
        echo "Educational Content: $EXPLANATIONS"
        echo ""
        
        # Create demo workspace
        mkdir -p interactive-demo/{walkthrough,results,explanations}
        
        # Prepare demo URL
        echo "$URL" > demo-target.txt
        
        echo "✅ Interactive demo environment ready"
        
    - name: "Step 1: Demo Introduction & Setup"
      run: |
        echo "🎯 STEP 1: Welcome to Clipper Interactive Demo"
        echo "=============================================="
        
        cat > interactive-demo/walkthrough/step-1-introduction.md << 'EOF'
        # 🎮 Welcome to Clipper 3.0 Interactive Demo
        
        ## What You'll Experience
        
        This interactive demonstration shows you Clipper's comprehensive web content evaluation in action. You'll see how Clipper analyzes web content across 5 standardized components to determine "agent retrievability" - how well AI agents can consume and understand your content.
        
        ## The 5-Component Framework
        
        1. **♿ WCAG 2.1 AA (25% weight)** - Accessibility compliance
           - Legal requirements, inclusive design
           - Evaluated with live browser automation
        
        2. **🏗️ W3C HTML5 (25% weight)** - Semantic markup validation
           - Standards conformance, SEO foundation
           - W3C validator integration
        
        3. **📋 Schema.org (20% weight)** - Structured data markup
           - Search optimization, data exchange
           - JSON-LD, Microdata detection
        
        4. **🌐 HTTP/1.1 (15% weight)** - Protocol compliance
           - Network performance, caching
           - RFC 7231 standard conformance  
        
        5. **📝 Content Quality (15% weight)** - Clarity and structure
           - Agent comprehension, readability
           - Content organization analysis
        
        ## What Makes This Different
        
        Unlike simple accessibility checkers or HTML validators, Clipper provides:
        - **Holistic Assessment**: All 5 components evaluated together
        - **Agent-Focused**: Optimized for AI/ML consumption patterns
        - **Standards-Based**: Authoritative framework references
        - **Actionable Insights**: Specific improvement recommendations
        
        Ready to see it in action? Let's evaluate a real website!
        EOF
        
        if [ "${{ github.event.inputs.include_explanations }}" = "true" ]; then
          echo "📖 Educational explanations enabled - detailed walkthrough mode"
          cat interactive-demo/walkthrough/step-1-introduction.md
        else
          echo "🚀 Fast demo mode - focusing on results and key insights"
        fi
        
        echo ""
        echo "🆔 Demo Target: $(cat demo-target.txt)"
        echo "⏱️  Estimated duration: 3-4 minutes"
        echo ""
        
    - name: "Step 2: Live Evaluation Execution"
      run: |
        echo "🔍 STEP 2: Executing Live Clipper Evaluation"
        echo "============================================="
        
        URL=$(cat demo-target.txt)
        
        echo "🎯 Target URL: $URL"
        echo "📊 Starting comprehensive evaluation across all 5 components..."
        echo ""
        
        # Show evaluation process in real-time style
        echo "⏳ Phase 1: Crawling and content retrieval..."
        sleep 2
        echo "⏳ Phase 2: WCAG accessibility analysis with live browser..."
        sleep 2  
        echo "⏳ Phase 3: W3C HTML validation and semantic analysis..."
        sleep 2
        echo "⏳ Phase 4: Schema.org structured data detection..."
        sleep 1
        echo "⏳ Phase 5: HTTP protocol compliance verification..."
        sleep 1
        echo "⏳ Phase 6: Content quality and structure assessment..."
        sleep 1
        echo ""
        
        # Execute actual evaluation
        echo "🚀 Running Clipper evaluation..."
        python main.py express \
          demo-target.txt \
          --out interactive-demo/results \
          --name live-demo \
          --quiet
        
        echo "✅ Live evaluation completed!"
        
    - name: "Step 3: Results Analysis & Breakdown"
      id: demo-execution  
      run: |
        echo "📊 STEP 3: Interactive Results Analysis"
        echo "======================================="
        
        if [ -f interactive-demo/results/live-demo_scores.json ]; then
          echo "🎉 Evaluation successful! Let's explore the results..."
          echo ""
          
          python3 << 'PYEOF'
        import json, sys, os

        with open('interactive-demo/results/live-demo_scores.json') as f:
            results = json.load(f)

        if not results:
            print('❌ No results available for demo')
            sys.exit(1)

        result = results[0]
        url = result.get('url', 'Demo URL')
        overall_score = result['parseability_score']

        print('🎯 LIVE DEMO RESULTS')
        print('=' * 40)
        print(f'URL Evaluated: {url}')
        print(f'Overall Agent Retrievability Score: {overall_score:.1f}/100')
        print()

        if 'component_scores' in result:
            components = result['component_scores']

            component_details = [
                ('wcag_accessibility', '♿ WCAG 2.1 AA Accessibility', 25, 'Legal compliance, inclusive design'),
                ('semantic_html', '🏗️  W3C HTML5 Validation', 25, 'Standards conformance, SEO foundation'),
                ('structured_data', '📋 Schema.org Structured Data', 20, 'Search optimization, data exchange'),
                ('http_compliance', '🌐 HTTP/1.1 Protocol', 15, 'Network performance, caching'),
                ('content_quality', '📝 Content Quality', 15, 'Agent comprehension, readability')
            ]

            print('COMPONENT-BY-COMPONENT BREAKDOWN:')
            print('-' * 50)

            total_weighted = 0

            for comp_key, comp_name, weight, purpose in component_details:
                score = components.get(comp_key, 0)
                weighted_contrib = (score * weight) / 100
                total_weighted += weighted_contrib

                if score >= 80:
                    status = '✅ Excellent'
                    icon = '🟢'
                elif score >= 70:
                    status = '🟢 Good'
                    icon = '🟢'
                elif score >= 60:
                    status = '🟡 Acceptable'
                    icon = '🟡'
                elif score >= 40:
                    status = '🟠 Needs Work'
                    icon = '🟠'
                else:
                    status = '🔴 Poor'
                    icon = '🔴'

                print(f'{comp_name}:')
                print(f'  Score: {score:.1f}/100 ({weight}% weight) = {weighted_contrib:.1f} weighted points')
                print(f'  Status: {icon} {status}')
                print(f'  Purpose: {purpose}')
                print()

            print(f'CALCULATED TOTAL: {total_weighted:.1f}/100 (matches overall score: {overall_score:.1f})')
            print()

            if overall_score >= 80:
                assessment = '🟢 EXCELLENT - This content is highly optimized for agent consumption'
                recommendation = 'Maintain current standards and monitor for regression'
            elif overall_score >= 65:
                assessment = '🟡 GOOD - Content is well-suited for agents with minor improvements possible'
                recommendation = 'Consider targeted improvements in lower-scoring components'
            elif overall_score >= 50:
                assessment = '🟠 ACCEPTABLE - Content is usable by agents but has significant improvement opportunities'
                recommendation = 'Focus on accessibility and semantic markup improvements'
            else:
                assessment = '🔴 NEEDS IMPROVEMENT - Content has barriers to effective agent consumption'
                recommendation = 'Comprehensive improvements needed across multiple components'

            print(f'OVERALL ASSESSMENT: {assessment}')
            print(f'RECOMMENDATION: {recommendation}')

            demo_insights = f'Score: {overall_score:.1f}/100, Assessment: {assessment}'
            with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                f.write(f'demo_completed=true\n')
                f.write(f'evaluation_score={overall_score:.1f}\n')
                f.write(f'demo_insights={demo_insights}\n')
        else:
            with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                f.write('demo_completed=false\n')
                f.write('evaluation_score=0.0\n')
                f.write('demo_insights=Component data not available\n')
        PYEOF
        else
          echo "❌ Demo evaluation failed - no results to display"
          echo "demo_completed=false" >> "$GITHUB_OUTPUT"
          echo "evaluation_score=0.0" >> "$GITHUB_OUTPUT"
          echo "demo_insights=Demo evaluation failed" >> "$GITHUB_OUTPUT"
        fi
        
    - name: "Step 4: Practical Applications & Use Cases"
      run: |
        echo "💡 STEP 4: Practical Applications & Next Steps"
        echo "=============================================="
        
        SCORE="${{ steps.demo-execution.outputs.evaluation_score }}"
        
        cat > interactive-demo/walkthrough/step-4-applications.md << 'EOF'
        # 🚀 Practical Applications of Clipper Evaluation
        
        ## Real-World Use Cases
        
        ### 1. **CI/CD Integration** 
        ```yaml
        # Quality gate in your pipeline
        - name: Content Quality Gate
          run: clipper express site-urls.txt --threshold 75
        ```
        
        ### 2. **Content Audit & Compliance**
        - WCAG accessibility compliance verification
        - Standards conformance before publication
        - Regular monitoring for content drift
        
        ### 3. **Agent Optimization**
        - Pre-optimize content for AI/ML consumption
        - Identify content that agents struggle with
        - Improve RAG (Retrieval Augmented Generation) effectiveness
        
        ### 4. **SEO & Discovery Enhancement**
        - Schema.org markup optimization
        - Semantic HTML structure improvement
        - Search engine discoverability
        
        ### 5. **Performance & Standards Monitoring**
        - HTTP protocol compliance
        - Network performance optimization
        - Cross-browser compatibility
        
        ## Implementation Strategies
        
        ### Quick Wins (Based on Demo Results)
        EOF
        
        # Add specific recommendations based on demo score
        if [ $(echo "$SCORE >= 80" | bc -l) -eq 1 ] 2>/dev/null; then
          cat >> interactive-demo/walkthrough/step-4-applications.md << 'EOF'
        
        ✅ **Your content scored excellently!** Focus on:
        - Maintaining current standards
        - Implementing monitoring to prevent regression
        - Sharing best practices with your team
        EOF
        elif [ $(echo "$SCORE >= 65" | bc -l) -eq 1 ] 2>/dev/null; then
          cat >> interactive-demo/walkthrough/step-4-applications.md << 'EOF'
        
        🟡 **Good foundation to build on:**
        - Review components scoring below 70
        - Implement targeted improvements
        - Consider automated quality gates
        EOF
        else
          cat >> interactive-demo/walkthrough/step-4-applications.md << 'EOF'
        
        🔧 **Improvement opportunities identified:**
        - Priority: Address accessibility and HTML validation
        - Implement comprehensive content review process
        - Consider phased improvement plan
        EOF
        fi
        
        cat >> interactive-demo/walkthrough/step-4-applications.md << 'EOF'
        
        ### Advanced Workflows
        
        **Enterprise Audit Trail**
        ```bash
        clipper express enterprise-urls.txt --audit --retention 2555
        ```
        
        **Component-Focused Analysis** 
        ```bash  
        clipper express urls.txt --component wcag --detailed
        ```
        
        **Performance Mode (2-3x faster)**
        ```bash
        clipper evaluate --performance urls.txt
        ```
        
        ## Getting Started
        
        1. **Install Clipper**: `pip install clipper-retrieval`
        2. **Quick Test**: `clipper express your-url.txt`
        3. **Review Results**: Check component scores and recommendations
        4. **Iterate**: Improve and re-evaluate
        5. **Automate**: Integrate into your workflow
        
        Ready to optimize your content for the age of AI agents? 🚀
        EOF
        
        if [ "${{ github.event.inputs.include_explanations }}" = "true" ]; then
          echo "📖 Displaying practical applications and implementation guide:"
          echo ""
          cat interactive-demo/walkthrough/step-4-applications.md
        else
          echo "🎯 Quick implementation summary:"
          echo "  • CI/CD integration for quality gates"
          echo "  • Content audit and compliance verification"  
          echo "  • Agent consumption optimization"
          echo "  • SEO and discoverability enhancement"
        fi
        
    - name: "Step 5: Interactive Demo Wrap-up"
      run: |
        echo "🎬 STEP 5: Demo Summary & Resources"
        echo "==================================="
        
        COMPLETED="${{ steps.demo-execution.outputs.demo_completed }}"
        SCORE="${{ steps.demo-execution.outputs.evaluation_score }}"
        INSIGHTS="${{ steps.demo-execution.outputs.demo_insights }}"
        
        echo "🎉 Interactive Clipper Demo Completed!"
        echo ""
        echo "📊 KEY TAKEAWAYS:"
        echo "  • Demonstrated: Live Clipper evaluation across 5 components"
        echo "  • Result: $INSIGHTS"
        echo "  • Framework: Standards-based agent retrievability assessment"
        echo "  • Value: Content optimization for AI age"
        echo ""
        
        echo "🔗 ADDITIONAL RESOURCES:"
        echo "  • Full Documentation: README.md in repository"
        echo "  • Demo Package: CLIPPER-DEMO-PACKAGE.md"
        echo "  • Quick Start: CLIPPER-QUICK-DEMO.md"
        echo "  • Installation: pip install clipper-retrieval"  
        echo ""
        
        echo "🚀 NEXT STEPS:"
        echo "  1. Try Clipper on your own content"
        echo "  2. Review component-specific recommendations"
        echo "  3. Integrate into your development workflow" 
        echo "  4. Monitor and maintain content quality over time"
        echo ""
        
        # Create demo completion certificate
        cat > interactive-demo/demo-completion.md << EOF
        # 🏆 Interactive Demo Completion Certificate
        
        **Participant**: GitHub Actions Automation  
        **Demo Completed**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")  
        **Mode**: ${{ github.event.inputs.demo_mode }}  
        **Score Achieved**: $SCORE/100  
        
        ## Demo Experience Summary
        
        ✅ **Experienced Clipper's 5-component evaluation framework**  
        ✅ **Witnessed live browser automation and standards validation**  
        ✅ **Learned practical applications and implementation strategies**  
        ✅ **Received component-specific insights and recommendations**  
        
        ## Ready for Production Use
        
        You've seen how Clipper optimizes content for AI agent consumption through comprehensive standards-based evaluation. Time to apply these insights to your own content!
        
        ---
        *Clipper 3.0 - Standards-Based Agent Retrievability Assessment*
        EOF
        
        echo "🏆 Demo completion certificate created"
        
        if [ "$COMPLETED" = "true" ]; then
          echo "✅ Interactive demo completed successfully!"
        else
          echo "⚠️ Demo encountered issues - check logs for details"
        fi
        
    - name: Create Interactive Demo Package
      run: |
        echo "📦 Creating comprehensive demo delivery package..."
        
        # Create demo index with navigation
        cat > interactive-demo/index.md << 'EOF'
        # 🎮 Clipper Interactive Demo Package
        
        ## Demo Walkthrough
        
        1. [Introduction & Setup](walkthrough/step-1-introduction.md)
        2. [Live Evaluation Results](results/live-demo_scores.json)  
        3. [Practical Applications](walkthrough/step-4-applications.md)
        4. [Demo Completion Certificate](demo-completion.md)
        
        ## Quick Navigation
        
        - **View Results**: `results/live-demo_scores.json`
        - **Understanding Components**: See step-1-introduction.md
        - **Implementation Guide**: See step-4-applications.md
        - **Raw Evaluation Data**: `results/` directory
        
        ## Demo Experience
        
        This package contains everything from your interactive Clipper demonstration, including live evaluation results, educational content, and practical implementation guidance.
        
        Use these materials to understand how Clipper can optimize your content for AI agent consumption through standards-based evaluation.
        EOF
        
        echo "✅ Interactive demo package ready for delivery"
        
    - name: Upload Interactive Demo Package
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: clipper-interactive-demo
        path: interactive-demo/
        retention-days: 45
        
    - name: Create Interactive Demo Summary  
      if: always()
      run: |
        echo "## 🎮 Interactive Clipper Demo Experience" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        MODE="${{ github.event.inputs.demo_mode || 'guided-walkthrough' }}"
        COMPLETED="${{ steps.demo-execution.outputs.demo_completed }}"
        SCORE="${{ steps.demo-execution.outputs.evaluation_score }}"
        URL="${{ github.event.inputs.demo_url || 'https://learn.microsoft.com/en-us/azure/azure-functions/functions-overview' }}"
        
        echo "### 🎯 Demo Configuration" >> $GITHUB_STEP_SUMMARY
        echo "- **Demo Mode**: $MODE" >> $GITHUB_STEP_SUMMARY
        echo "- **Target URL**: $URL" >> $GITHUB_STEP_SUMMARY
        echo "- **Educational Content**: ${{ github.event.inputs.include_explanations }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "$COMPLETED" = "true" ]; then
          echo "### ✅ Demo Completed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | What You Experienced |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|---------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🎯 Live Evaluation | Real-time Clipper assessment of actual web content |" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 Component Analysis | 5-part framework breakdown with detailed scoring |" >> $GITHUB_STEP_SUMMARY
          echo "| 💡 Practical Applications | Implementation strategies and use cases |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Next Steps | Clear guidance for production deployment |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Final Evaluation Score**: $SCORE/100" >> $GITHUB_STEP_SUMMARY
        else
          echo "### ⚠️ Demo Issues Encountered" >> $GITHUB_STEP_SUMMARY
          echo "The interactive demo experienced technical difficulties. Please check the logs for details and try again." >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 Demo Deliverables" >> $GITHUB_STEP_SUMMARY
        echo "- **Walkthrough Materials**: Step-by-step educational content" >> $GITHUB_STEP_SUMMARY
        echo "- **Live Evaluation Results**: Real assessment data and component scores" >> $GITHUB_STEP_SUMMARY
        echo "- **Implementation Guide**: Practical applications and integration strategies" >> $GITHUB_STEP_SUMMARY
        echo "- **Completion Certificate**: Record of demo experience" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "> 🎮 **Experience Complete**: You've seen Clipper's comprehensive web content evaluation in action. Ready to optimize your own content for the age of AI agents!" >> $GITHUB_STEP_SUMMARY
        
  demo-feedback:
    needs: interactive-demo
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Demo Experience Summary
      run: |
        echo "🎮 Interactive Clipper Demo Summary"
        echo "=================================="
        
        COMPLETED="${{ needs.interactive-demo.outputs.demo_completed }}"
        SCORE="${{ needs.interactive-demo.outputs.evaluation_score }}"
        
        if [ "$COMPLETED" = "true" ]; then
          echo "✅ Demo completed successfully!"
          echo "📊 Evaluation Score: $SCORE/100"
          echo "🎯 Experience: Complete 5-component framework demonstration"
          echo "💡 Value: Hands-on understanding of agent retrievability assessment"
        else
          echo "⚠️ Demo encountered technical issues"
          echo "🔄 Recommend: Review logs and retry demonstration"
        fi
        
        echo ""
        echo "🚀 Ready to implement Clipper in your workflow?"
        echo "   • Install: pip install clipper-retrieval"
        echo "   • Quick test: clipper express your-urls.txt" 
        echo "   • Integrate: Add to CI/CD pipeline"