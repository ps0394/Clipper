name: Clipper Comprehensive Demo (5 minutes)

on:
  workflow_dispatch:
    inputs:
      urls_file:
        description: 'URLs file to use (default: clipper-demo-urls.txt)'
        required: false
        default: 'clipper-demo-urls.txt'
  schedule:
    - cron: '0 10 * * 2'  # Weekly Tuesday 10 AM comprehensive test

jobs:
  comprehensive-demo:
    runs-on: ubuntu-latest
    name: "🎯 5-Minute Comprehensive Demo"
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install Chrome for WCAG evaluation
      uses: browser-actions/setup-chrome@v1
      
    - name: Install dependencies
      run: |
        pip install -e .
        
    - name: Verify demo URLs file
      run: |
        URLS_FILE="${{ github.event.inputs.urls_file || 'clipper-demo-urls.txt' }}"
        
        if [ ! -f "$URLS_FILE" ]; then
          echo "⚠️ URLs file not found: $URLS_FILE"
          echo "Creating demo URLs file..."
          
          cat > clipper-demo-urls.txt << EOF
        https://learn.microsoft.com/en-us/azure/azure-functions/functions-overview
        https://docs.microsoft.com/en-us/dotnet/
        https://www.w3.org/WAI/WCAG21/quickref/
        https://schema.org/docs/gs.html
        https://developer.mozilla.org/en-US/docs/Web/HTML/Element
        EOF
          
          echo "✅ Created demo URLs file with 5 high-quality sites"
        else
          echo "✅ Using existing URLs file: $URLS_FILE"
          echo "URLs to evaluate:"
          cat "$URLS_FILE" | head -10
        fi
        
    - name: Run Comprehensive Demo
      run: |
        echo "🚀 Starting Clipper Comprehensive Demo..."
        echo "📊 Evaluating multiple sites from: ${{ github.event.inputs.urls_file || 'clipper-demo-urls.txt' }}"
        
        python main.py express \
          "${{ github.event.inputs.urls_file || 'clipper-demo-urls.txt' }}" \
          --out clipper-showcase \
          --name comprehensive
          
        echo "✅ Comprehensive Demo Complete!"
        
    - name: Generate Summary Report
      run: |
        if [ -f clipper-showcase/comprehensive_scores.json ]; then
          echo "📊 **COMPREHENSIVE DEMO RESULTS**"
          
          # Calculate aggregate metrics
          python -c "
          import json
          
          with open('clipper-showcase/comprehensive_scores.json') as f:
              data = json.load(f)
          
          if data:
              scores = [item['parseability_score'] for item in data]
              avg_score = sum(scores) / len(scores)
              clean_sites = sum(1 for score in scores if score >= 70)
              total_sites = len(scores)
              
              print(f'Total Sites Evaluated: {total_sites}')
              print(f'Average Score: {avg_score:.1f}/100')
              print(f'Clean Sites (≥70): {clean_sites}/{total_sites} ({clean_sites/total_sites*100:.1f}%)')
              print()
              
              # Top performers
              scored_sites = [(item['url'], item['parseability_score']) for item in data]
              scored_sites.sort(key=lambda x: x[1], reverse=True)
              
              print('🏆 Top Performers:')
              for i, (url, score) in enumerate(scored_sites[:3]):
                  print(f'  {i+1}. {score:.1f}/100 - {url}')
              
              print()
              print('📈 All Results:')
              for url, score in scored_sites:
                  status = '🟢' if score >= 80 else '🟡' if score >= 60 else '🟠' if score >= 40 else '🔴'
                  print(f'  {status} {score:.1f}/100 - {url}')
          else:
              print('No results found')
          "
        else
          echo "❌ Demo failed - no results generated"
        fi
        
    - name: Display Component Analysis
      run: |
        if [ -f clipper-showcase/comprehensive_scores.json ]; then
          echo ""
          echo "📋 **COMPONENT ANALYSIS ACROSS ALL SITES**"
          
          python -c "
          import json
          from collections import defaultdict
          
          with open('clipper-showcase/comprehensive_scores.json') as f:
              data = json.load(f)
          
          if data:
              component_totals = defaultdict(list)
              
              for item in data:
                  if 'component_scores' in item:
                      for component, score in item['component_scores'].items():
                          component_totals[component].append(score)
              
              print('Average Component Scores:')
              for component, scores in component_totals.items():
                  if scores:
                      avg = sum(scores) / len(scores)
                      component_name = {
                          'wcag_accessibility': '🌟 WCAG Accessibility',
                          'semantic_html': '🏗️  Semantic HTML',
                          'structured_data': '📋 Structured Data', 
                          'http_compliance': '🌐 HTTP Compliance',
                          'content_quality': '📝 Content Quality'
                      }.get(component, component)
                      
                      status = '🟢' if avg >= 80 else '🟡' if avg >= 60 else '🟠' if avg >= 40 else '🔴'
                      print(f'  {status} {component_name}: {avg:.1f}/100')
          "
        fi
        
    - name: Upload Demo Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: comprehensive-demo-results
        path: clipper-showcase/
        retention-days: 30
        
    - name: Create Detailed Summary
      run: |
        echo "## 🎯 Clipper Comprehensive Demo Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**URLs File:** ${{ github.event.inputs.urls_file || 'clipper-demo-urls.txt' }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -f clipper-showcase/comprehensive_scores.json ]; then
          python -c "
          import json
          
          with open('clipper-showcase/comprehensive_scores.json') as f:
              data = json.load(f)
          
          if data:
              scores = [item['parseability_score'] for item in data]
              avg_score = sum(scores) / len(scores)
              clean_sites = sum(1 for score in scores if score >= 70)
              total_sites = len(scores)
              
              print(f'**Total Sites:** {total_sites}')
              print(f'**Average Score:** {avg_score:.1f}/100')
              print(f'**Quality Gate Pass Rate:** {clean_sites}/{total_sites} ({clean_sites/total_sites*100:.1f}%)')
              print('')
              
              print('### Detailed Results')
              print('')
              print('| Rank | Score | URL | Status |')
              print('|------|-------|-----|--------|')
              
              scored_sites = [(item['url'], item['parseability_score']) for item in data]
              scored_sites.sort(key=lambda x: x[1], reverse=True)
              
              for i, (url, score) in enumerate(scored_sites):
                  status = '🟢 Excellent' if score >= 80 else '🟡 Good' if score >= 60 else '🟠 Needs Work' if score >= 40 else '🔴 Critical'
                  # Truncate long URLs for display
                  display_url = url if len(url) <= 60 else url[:57] + '...'
                  print(f'| {i+1} | {score:.1f}/100 | {display_url} | {status} |')
          " >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Comprehensive evaluation completed successfully!**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> This demonstrates Clipper's batch processing capabilities and scalability across multiple sites." >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Demo failed** - Check logs for details" >> $GITHUB_STEP_SUMMARY
        fi