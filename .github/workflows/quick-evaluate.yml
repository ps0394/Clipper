name: Quick URL Evaluation

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'URLs to evaluate (one per line)'
        required: true
        type: string
        default: |
          https://docs.microsoft.com/en-us/azure/
          https://github.com/docs
      output_name:
        description: 'Name for this evaluation (optional)'
        required: false
        type: string
        default: 'quick-eval'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        
    - name: Create URLs file
      run: |
        cat > urls.txt << 'EOF'
        ${{ github.event.inputs.urls }}
        EOF
        
    - name: Run evaluation pipeline
      run: |
        # Create output directory
        mkdir -p evaluation-results
        
        # Run full pipeline
        python -m retrievability.cli crawl urls.txt --out snapshots/
        python -m retrievability.cli parse snapshots/ --out evaluation-results/parse.json
        python -m retrievability.cli score evaluation-results/parse.json --out evaluation-results/scores.json
        python -m retrievability.cli report evaluation-results/scores.json --md evaluation-results/report.md
        
        # Create summary for comment
        python -c "
        import json
        with open('evaluation-results/scores.json') as f:
            scores = json.load(f)
        
        total = len(scores)
        avg_score = sum(s['parseability_score'] for s in scores) / total if total > 0 else 0
        clean = sum(1 for s in scores if s['failure_mode'] == 'clean')
        
        print(f'''## 📊 Quick Evaluation Results
        
**📈 Summary:**
- **Total URLs:** {total}
- **Average Score:** {avg_score:.1f}/100
- **Agent-Ready:** {clean}/{total} ({clean/total*100:.1f}% if total > 0 else 0)

**📋 Individual Scores:**''')
        
        for score in scores:
            url = score.get('url', 'Unknown URL')
            score_val = score['parseability_score']
            mode = score['failure_mode']
            emoji = '✅' if mode == 'clean' else '⚠️' if score_val >= 60 else '❌'
            print(f'- {emoji} **{score_val:.0f}/100** - {url} `({mode})`')
        " > evaluation-results/summary.md
        
    - name: Comment results
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const summary = fs.readFileSync('evaluation-results/summary.md', 'utf8');
          const report = fs.readFileSync('evaluation-results/report.md', 'utf8');
          
          // Create comment with results
          await github.rest.repos.createCommitComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            commit_sha: context.sha,
            body: `${summary}

<details>
<summary>📄 View Detailed Report</summary>

${report}

</details>

---
*Evaluation completed via [Quick URL Evaluation workflow](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`
          });
          
    - name: Upload results as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: evaluation-results-${{ github.event.inputs.output_name || 'quick-eval' }}
        path: evaluation-results/