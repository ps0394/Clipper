name: Quick URL Evaluation

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'URLs to evaluate (one per line)'
        required: true
        type: string
        default: |
          https://docs.microsoft.com/en-us/azure/
          https://github.com/docs
      output_name:
        description: 'Name for this evaluation (optional)'
        required: false
        type: string
        default: 'quick-eval'

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        
    - name: Create URLs file
      run: |
        cat > urls.txt << 'EOF'
        ${{ github.event.inputs.urls }}
        EOF
        
    - name: Run evaluation pipeline
      run: |
        mkdir -p evaluation-results
        python -m retrievability.cli crawl urls.txt --out snapshots/
        python -m retrievability.cli parse snapshots/ --out evaluation-results/parse.json
        python -m retrievability.cli score evaluation-results/parse.json --out evaluation-results/scores.json
        python -m retrievability.cli report evaluation-results/scores.json --md evaluation-results/report.md
        
    - name: Generate summary
      run: |
        python -c "
        import json
        with open('evaluation-results/scores.json') as f:
            scores = json.load(f)
        
        # Read the original URLs that were submitted
        with open('urls.txt') as f:
            submitted_urls = [line.strip() for line in f if line.strip()]
        
        total = len(scores)
        avg_score = sum(s['parseability_score'] for s in scores) / total if total > 0 else 0
        clean = sum(1 for s in scores if s['failure_mode'] == 'clean')
        
        print(f'## Quick Evaluation Results')
        print(f'')
        print(f'**URLs Evaluated:**')
        for i, url in enumerate(submitted_urls, 1):
            print(f'{i}. {url}')
        print(f'')
        print(f'**Summary:**')
        print(f'- Total URLs: {total}')
        print(f'- Average Score: {avg_score:.1f}/100')
        print(f'- Agent-Ready: {clean}/{total} ({clean/total*100:.1f}%)')
        print(f'')
        print(f'**Individual Scores:**')
        
        for score in scores:
            url = score.get('url', 'Unknown URL')
            score_val = score['parseability_score']
            mode = score['failure_mode']
            
            if mode == 'clean':
                emoji = '✅ PASS'
            elif score_val >= 60:
                emoji = '⚠️ WARN'
            else:
                emoji = '❌ FAIL'
                
            print(f'- {emoji} **{score_val:.0f}/100** - {url}')
            if mode != 'clean':
                print(f'  - Issue: {mode}')
        " > evaluation-results/summary.md
        
    - name: Display results in workflow summary
      run: |
        echo "## Quick Evaluation Results" >> $GITHUB_STEP_SUMMARY
        cat evaluation-results/summary.md >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "<details><summary>View Detailed Report</summary>" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        cat evaluation-results/report.md >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "</details>" >> $GITHUB_STEP_SUMMARY
          
    - name: Upload results as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: evaluation-results-${{ github.event.inputs.output_name || 'quick-eval' }}
        path: evaluation-results/