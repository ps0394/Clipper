name: Example Usage - Custom Documentation Evaluation

# This workflow demonstrates how other repositories can use the reusable
# docs-eval action to evaluate their own documentation quality

on:
  workflow_dispatch:
    inputs:
      urls-input:
        description: 'URLs to evaluate (one per line, or leave empty to use predefined list)'
        required: false
        type: string
      custom-thresholds:
        description: 'Use custom quality thresholds'
        required: false
        type: boolean
        default: false

jobs:
  # Example 1: Basic usage with default settings
  basic-evaluation:
    name: Basic Evaluation
    runs-on: ubuntu-latest
    if: github.event.inputs.custom-thresholds != 'true'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: pip install -r requirements.txt
      
    - name: Prepare URLs
      run: |
        if [ -n "${{ github.event.inputs.urls-input }}" ]; then
          echo "${{ github.event.inputs.urls-input }}" > custom-urls.txt
          echo "Using custom URLs:"
          cat custom-urls.txt
        else
          cp samples/urls.txt custom-urls.txt
          echo "Using default sample URLs"
        fi
      
    - name: Evaluate documentation quality
      id: eval
      uses: ./.github/actions/docs-eval
      with:
        urls-file: 'custom-urls.txt'
        output-dir: 'basic-eval-results'
        min-score: '70'
        min-clean-percentage: '60'
        
    - name: Display results
      run: |
        echo "🎯 Evaluation Results:"
        echo "   Average Score: ${{ steps.eval.outputs.average-score }}/100"
        echo "   Clean Pages: ${{ steps.eval.outputs.clean-count }}/${{ steps.eval.outputs.total-pages }}"
        echo "   Quality Passed: ${{ steps.eval.outputs.quality-passed }}"
        
  # Example 2: Advanced usage with custom thresholds and no failure
  advanced-evaluation:
    name: Advanced Evaluation (Custom Thresholds)
    runs-on: ubuntu-latest
    if: github.event.inputs.custom-thresholds == 'true'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: pip install -r requirements.txt
      
    - name: Prepare URLs
      run: |
        if [ -n "${{ github.event.inputs.urls-input }}" ]; then
          echo "${{ github.event.inputs.urls-input }}" > custom-urls.txt
        else
          cp samples/urls.txt custom-urls.txt
        fi
      
    - name: Evaluate with custom settings
      id: eval
      uses: ./.github/actions/docs-eval
      with:
        urls-file: 'custom-urls.txt'
        output-dir: 'advanced-eval-results'
        min-score: '85'              # Higher threshold
        min-clean-percentage: '80'   # Higher threshold
        fail-on-quality-gate: 'false'  # Don't fail the workflow
        
    - name: Generate custom analysis
      run: |
        echo "📊 Advanced Analysis Results:"
        echo "   Average Score: ${{ steps.eval.outputs.average-score }}/100"
        echo "   Quality Target: 85+ (Advanced)"
        echo "   Clean Pages: ${{ steps.eval.outputs.clean-percentage }}%"
        echo "   Clean Target: 80%+ (Advanced)"
        echo "   Advanced Quality Met: ${{ steps.eval.outputs.quality-passed }}"
        
        # Custom logic based on results
        avg_score=${{ steps.eval.outputs.average-score }}
        if (( $(echo "$avg_score >= 90" | bc -l) )); then
          echo "🏆 Excellent documentation quality!"
        elif (( $(echo "$avg_score >= 80" | bc -l) )); then
          echo "👍 Good documentation quality"
        elif (( $(echo "$avg_score >= 70" | bc -l) )); then
          echo "⚠️ Moderate documentation quality - improvements recommended"
        else
          echo "🔧 Documentation needs significant improvements"
        fi
        
    - name: Upload results with custom retention
      uses: actions/upload-artifact@v3
      with:
        name: advanced-evaluation-results
        path: advanced-eval-results/
        retention-days: 7
        
  # Example 3: Multi-environment evaluation
  multi-environment:
    name: Multi-Environment Evaluation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [development, staging, production]
        exclude:
          - environment: production
            # Skip production during manual testing
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: pip install -r requirements.txt
      
    - name: Prepare environment-specific URLs
      run: |
        case "${{ matrix.environment }}" in
          development)
            echo "https://dev-docs.example.com/getting-started" > env-urls.txt
            echo "https://dev-docs.example.com/api" >> env-urls.txt
            ;;
          staging)
            echo "https://staging-docs.example.com/getting-started" > env-urls.txt
            echo "https://staging-docs.example.com/api" >> env-urls.txt
            ;;
          production)
            # Use sample URLs as production example
            cp samples/urls.txt env-urls.txt
            ;;
        esac
        
        echo "URLs for ${{ matrix.environment }}:"
        cat env-urls.txt
        
    - name: Evaluate ${{ matrix.environment }} documentation
      id: eval
      uses: ./.github/actions/docs-eval
      with:
        urls-file: 'env-urls.txt'
        output-dir: '${{ matrix.environment }}-results'
        min-score: '75'
        min-clean-percentage: '65'
        fail-on-quality-gate: 'false'
        
    - name: Environment-specific analysis
      run: |
        echo "📊 ${{ matrix.environment }} Environment Results:"
        echo "   Score: ${{ steps.eval.outputs.average-score }}/100"
        echo "   Clean: ${{ steps.eval.outputs.clean-percentage }}%"
        
        # Environment-specific thresholds
        case "${{ matrix.environment }}" in
          production)
            if (( $(echo "${{ steps.eval.outputs.average-score }} < 85" | bc -l) )); then
              echo "⚠️ Production documentation below recommended 85+ score"
            fi
            ;;
          staging)
            if (( $(echo "${{ steps.eval.outputs.average-score }} < 75" | bc -l) )); then
              echo "⚠️ Staging documentation should be 75+ before production deployment"
            fi
            ;;
          development)
            echo "ℹ️ Development environment - monitoring for trends"
            ;;
        esac